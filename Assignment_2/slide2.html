<!DOCTYPE html>
<html lang="en">
<head>
    <title>Rivo Fashion</title>
    <style>
        body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #a8c59f;
}


/* Navbar */

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
}

.logo {
    font-size: 28px;
    font-weight: bold;
}

.menu {
    display: flex;
    list-style: none;
    gap: 40px;
}

.menu li {
    cursor: pointer;
}

.login {
    padding: 10px 20px;
    border: 2px solid black;
    background: transparent;
    border-radius: 8px;
}


/* Hero Section */

.hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 50px;
}


.text h1 {
    font-size: 60px;
    color: #1f3d1f;
}

.text p {
    width: 400px;
    font-size: 18px;
    margin: 20px 0;
}


.explore {
    padding: 12px 25px;
    background: #1f3d1f;
    color: white;
    border: none;
    border-radius: 8px;
}


.image img {
    width: 350px;
    border-radius: 20px;
}
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="logo">Rivo</div>

        <ul class="menu">
            <li>HOME</li>
            <li>SHOP</li>
            <li>FEATURES</li>
            <li>CONTACT</li>
        </ul>

        <button class="login">LOGIN</button>
    </nav>


    <!-- Hero Section -->
    <section class="hero">

        <div class="text">
            <h1>
                Discover And <br>
                Find Your <br>
                Own Fashion
            </h1>

            <p>
                Explore our curated collection of stylish clothing
                and accessories tailored to your unique taste.
            </p>

            <button class="explore">Explore Now</button>
        </div>


        <div class="image">
            <img src="model.jpg" alt="">
        </div>

    </section>

</body>
</html>
